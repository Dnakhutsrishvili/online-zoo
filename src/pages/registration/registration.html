<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./registration.css" />
    <link rel="stylesheet" href="../landing/landing.css" />
    <link rel="icon" type="image/x-icon" href="/assets/icons/main-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Register — Online Zoo</title>
  </head>
  <body>

     <header class="navbar">
      <div class="logo">
        <img src="/assets/icons/main-logo.png" alt="Logo" />
      </div>
      <input type="checkbox" id="menu-toggle" class="menu-toggle" />

      <label for="menu-toggle" class="burger">
        <span></span>
        <span></span>
        <span></span>
      </label>
    <ul class="nav-links montserrat-semi-bold">
        <li><a  style="color: #00A092;" href="/">ABOUT</a></li>
<li><a href="/map">MAP</a></li>
<li><a  href="/animal">ZOOS</a></li>
<li><a  href="/contact">CONTACT US</a></li>
    </ul>
      <ul class="social-media-header">
          <li>
            <a href="https://www.facebook.com/" target="_blank"
              ><img src="/assets/icons/facebook.png" alt="Facebook"
            /></a>
          </li>
          <li>
            <a href="https://www.instagram.com/" target="_blank"
              ><img src="/assets/icons/instagram.png" alt="instagram"
            /></a>
          </li>
          <li>
            <a href="https://www.youtube.com/" target="_blank"
              ><img src="/assets/icons/youtube.png" alt="youtube"
            /></a>
          </li>
        </ul>

      <div class="user-widget" id="user-widget">
        <button class="user-btn" id="user-btn" aria-label="User menu" aria-expanded="false">
          <svg class="user-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <span class="user-name montserrat-semi-bold" id="user-name"></span>
        </button>

        <div class="user-popup" id="user-popup" role="menu">
          <div class="popup-guest" id="popup-guest">
            <button class="popup-option montserrat-semi-bold" id="open-signin-modal">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
              Sign In
            </button>
            <div class="popup-divider"></div>
            <a href="/src/pages/registration/registration.html" class="popup-option montserrat-semi-bold">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
              </svg>
              Registration
            </a>
          </div>

          <div class="popup-user" id="popup-user">
            <div class="popup-profile">
              <div class="popup-avatar" id="popup-avatar"></div>
              <div class="popup-info">
                <p class="popup-info-name montserrat-semi-bold" id="popup-info-name"></p>
                <p class="popup-info-email montserrat-regular" id="popup-info-email"></p>
              </div>
            </div>
            <div class="popup-divider"></div>
            <button class="popup-signout montserrat-semi-bold" id="signout-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </header>
    <main class="register-main">
      <div class="register-card">

        <div class="card-accent"></div>

        <div class="card-body">
          <h1 class="montserrat-heavy">Create Account</h1>
          <p class="montserrat-regular subtitle">Join the Online Zoo community</p>

          <form id="register-form" novalidate>

            <div class="field-group" id="group-login">
              <label class="montserrat-semi-bold" for="login">Login</label>
              <div class="input-wrap">
                <input
                  type="text"
                  id="login"
                  name="login"
                  placeholder="e.g. johnDoe"
                  autocomplete="username"
                />
                <span class="error-icon" aria-hidden="true">!</span>
              </div>
              <span class="field-error montserrat-regular" id="error-login"></span>
            </div>

            <div class="field-group" id="group-name">
              <label class="montserrat-semi-bold" for="name">Name</label>
              <div class="input-wrap">
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="e.g. John"
                  autocomplete="given-name"
                />
                <span class="error-icon" aria-hidden="true">!</span>
              </div>
              <span class="field-error montserrat-regular" id="error-name"></span>
            </div>

            <div class="field-group" id="group-email">
              <label class="montserrat-semi-bold" for="email">Email</label>
              <div class="input-wrap">
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="e.g. john@example.com"
                  autocomplete="email"
                />
                <span class="error-icon" aria-hidden="true">!</span>
              </div>
              <span class="field-error montserrat-regular" id="error-email"></span>
            </div>

            <div class="field-group" id="group-password">
              <label class="montserrat-semi-bold" for="password">Password</label>
              <div class="input-wrap">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Min. 6 chars + special character"
                  autocomplete="new-password"
                />
                <button type="button" class="toggle-pw" data-target="password" aria-label="Toggle password visibility">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
                <span class="error-icon" aria-hidden="true">!</span>
              </div>
              <span class="field-error montserrat-regular" id="error-password"></span>
            </div>

            <div class="field-group" id="group-confirm">
              <label class="montserrat-semi-bold" for="confirm">Confirm Password</label>
              <div class="input-wrap">
                <input
                  type="password"
                  id="confirm"
                  name="confirm"
                  placeholder="Repeat your password"
                  autocomplete="new-password"
                />
                <button type="button" class="toggle-pw" data-target="confirm" aria-label="Toggle confirm password visibility">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
                <span class="error-icon" aria-hidden="true">!</span>
              </div>
              <span class="field-error montserrat-regular" id="error-confirm"></span>
            </div>

            <p class="server-error montserrat-regular" id="server-error" aria-live="polite"></p>

            <button type="submit" id="register-btn" class="montserrat-semi-bold" disabled>
              REGISTER
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>

          </form>

          <p class="montserrat-regular login-link">
            Already have an account? <a href="../login/login.html">Sign in</a>
          </p>
        </div>

      </div>
    </main>

    <script type="module" src="./registration.ts"></script>
  </body>
</html>
