      </div>
      <input type="checkbox" id="menu-toggle" class="menu-toggle" />

      <label for="menu-toggle" class="burger">
        <span></span>
        <span></span>
        <span></span>
      </label>
    <ul class="nav-links montserrat-semi-bold">
      <li><a  href="/">ABOUT</a></li>
      <li><a style="color: #00A092;" href="/src/pages/map/map.html">MAP</a></li>
      <li><a  href="/src/pages/animal/animal-page.html">ZOOS</a></li>
      <li><a href="/src/pages/contact/contact.html">CONTACT US</a></li>
      <li><a id="user-item" href=""></a></li>
    </ul>
      <ul class="social-media-header">
          <li>
            <a href="https://www.facebook.com/" target="_blank"
              ><img src="/assets/icons/facebook.png" alt="Facebook"
            /></a>
          </li>
          <li>
            <a href="https://www.instagram.com/" target="_blank"
              ><img src="/assets/icons/instagram.png" alt="instagram"
            /></a>
          </li>
          <li>

              ><img src="/assets/icons/youtube.png" alt="youtube"
            /></a>
          </li>
        </ul>

      <div class="user-widget" id="user-widget">
        <button class="user-btn" id="user-btn" aria-label="User menu" aria-expanded="false">
          <svg class="user-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <span class="user-name montserrat-semi-bold" id="user-name"></span>
        </button>

        <div class="user-popup" id="user-popup" role="menu">
          <div class="popup-guest" id="popup-guest">
            <button class="popup-option montserrat-semi-bold" id="open-signin-modal">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
              Sign In
            </button>
            <div class="popup-divider"></div>
            <a href="/src/pages/registration/registration.html" class="popup-option montserrat-semi-bold">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
              </svg>
              Registration
            </a>
          </div>

          <div class="popup-user" id="popup-user">
            <div class="popup-profile">
              <div class="popup-avatar" id="popup-avatar"></div>
              <div class="popup-info">
                <p class="popup-info-name montserrat-semi-bold" id="popup-info-name"></p>
                <p class="popup-info-email montserrat-regular" id="popup-info-email"></p>
              </div>
            </div>
            <div class="popup-divider"></div>
            <button class="popup-signout montserrat-semi-bold" id="signout-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </header>

        <div class="map-container">
            <h2 class="montserrat-regular">find where are the animals live</h2>

<img src="/assets/map/icons/animal-icon-1.png" alt="icon" class="map-icon" />  
<img src="/assets/map/icons/animal-icon-2.png" alt="icon" class="map-icon" />

<img src="/assets/map/icons/animal-icon-4.png" alt="icon" class="map-icon" />
<img src="/assets/map/icons/animal-icon-5.png" alt="icon" class="map-icon" />  
<img src="/assets/map/icons/animal-icon-6.png" alt="icon" class="map-icon" />  
<img src="/assets/map/icons/animal-icon-7.png" alt="icon" class="map-icon" />  
<img src="/assets/map/icons/animal-icon-8.png" alt="icon" class="map-icon" />
